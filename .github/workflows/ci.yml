name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
  push:
    branches: [main]
    paths:
      - 'packages/**'

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SDK packages
        run: npm run build

      - name: Unit tests
        run: npm run test:unit
