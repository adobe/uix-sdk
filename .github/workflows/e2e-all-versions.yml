name: E2E All Versions Tests

# This workflow tests compatibility between different published versions of UIX packages
# It installs specific versions from the public npm registry and runs E2E tests

on: workflow_dispatch

jobs:
  e2e-tests:
    name: Run E2E Tests with TestCafe
    runs-on: ubuntu-latest

    strategy:
      matrix:
        host-app-version: [ "0.8.5", "0.9.2", "0.10.3", "0.10.4", "1.0.0", "1.0.1", "1.0.5", "1.1.1", "1.1.3", "1.1.6" ]
        guest-app-version: [ "0.8.5", "0.9.2", "0.10.3", "0.10.4", "1.0.0", "1.0.1", "1.0.5", "1.1.1", "1.1.3", "1.1.6" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.19.5'

      - name: Remove any cached npm config
        run: |
          rm -f ~/.npmrc
          rm -f .npmrc
          npm config set registry https://registry.npmjs.org/
          npm config set @adobe:registry https://registry.npmjs.org/

      - name: Set up host app
        run: node scripts/e2e-setup.mjs host ${{ matrix.host-app-version }}

      - name: Set up guest app
        run: node scripts/e2e-setup.mjs guest ${{ matrix.guest-app-version }}

      - name: Set up tests
        run: node scripts/e2e-setup.mjs tests

      - name: Start Host App
        working-directory: e2e/host-app
        run: PORT=3000 npm start &

      - name: Start Guest App
        working-directory: e2e/guest-app
        run: PORT=3002 npm start &

      - name: Wait for Applications to be Ready
        run: |
          echo "Waiting for services to start..."
          sleep 10
          npm install -g wait-on

      - name: Wait for servers to start
        run: wait-on http://localhost:3000 http://localhost:3002 --timeout 60000

      - name: Run E2E Tests with TestCafe
        working-directory: e2e/tests
        run: npm test
