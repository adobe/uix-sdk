name: npm-publish-manual
on:
  workflow_dispatch:
    inputs:
      level:
        description: "<newversion> | major | minor | patch | prerelease"
        required: true
        default: "patch"
      skip_version:
        description: "Skip version bump (useful when re-publishing an existing tag)"
        type: boolean
        default: false
      skip_git:
        description: "Skip git commit and tag (useful when re-publishing an existing tag)"
        type: boolean
        default: false

jobs:
  publish:
    if: github.repository == 'adobe/uix-sdk'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up git user
        uses: fregante/setup-git-user@v1
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install project dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test
      - name: Publish SDK packages
        run: |
          node scripts/release.mjs ${{ github.event.inputs.level }} \
            ${{ github.event.inputs.skip_version == 'true' && '--no-version' || '' }} \
            ${{ github.event.inputs.skip_git == 'true' && '--no-git' || '' }}
        env:
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
